<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bird Shots</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#87ceeb,#e0f7ff);
}

.header{
position:absolute;
top:0;
width:100%;
background:#111;
color:white;
text-align:center;
padding:10px;
font-size:22px;
z-index:10;
}

#coins{color:gold}

#game{
position:absolute;
top:60px;
width:100%;
height:85vh;
}

/* bird */

#bird{
position:absolute;
left:-100px;
width:80px;
}

/* gun */

#gun{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:90px;
}

/* gun button */

.gunMenuBtn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#ff9800;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
z-index:50;
}

/* gun popup */

.gunPopup{
position:fixed;
bottom:90px;
right:20px;
background:white;
border-radius:10px;
padding:10px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

.gunPopup div{
padding:6px 10px;
cursor:pointer;
}

/* bullet */

.bullet{
position:absolute;
width:60px;
animation:shoot 1s linear forwards;
}

@keyframes shoot{
0%{bottom:120px}
100%{bottom:95%}
}

/* blast */

.blast{
position:absolute;
font-size:60px;
animation:boom .6s forwards;
}

@keyframes boom{
0%{transform:scale(.5);opacity:1}
100%{transform:scale(2);opacity:0}
}

/* coin */

.coin{
position:absolute;
font-size:20px;
animation:coinFly 1s forwards;
}

@keyframes coinFly{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120px);opacity:0}
}

/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
display:none;
z-index:999;
}

.popup button{
margin-top:15px;
padding:10px 20px;
background:#ff9800;
border:none;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<div class="header">
Coins: <span id="coins">0</span>
</div>

<div id="game">

<img id="bird" src="bird.gif">

<img id="gun" src="gun.gif">

</div>

<div class="gunMenuBtn" onclick="toggleGunMenu()">🔫</div>

<div class="gunPopup" id="gunPopup">
<div onclick="selectGun(1)">Gun 1</div>
<div onclick="selectGun(2)">Gun 2 🔥</div>
<div onclick="selectGun(3)">Gun 3 ⚡</div>
</div>

<div class="popup" id="popup">
<h2>Great Playing 🎉</h2>
<p>Reward stage reached</p>
<button onclick="closePopup()">Close</button>
</div>

<!-- Sounds -->

<audio id="gunSound" src="gun.mp3"></audio>
<audio id="blastSound" src="blast.mp3"></audio>
<audio id="popupSound" src="popup.mp3"></audio>

<script>

let coins=sessionStorage.getItem("coins")||0
coins=parseInt(coins)

let nextPopup=sessionStorage.getItem("nextPopup")||50
nextPopup=parseInt(nextPopup)

document.getElementById("coins").innerText=coins

let gunType=1
let canShoot=true
let gamePaused=false

let bird=document.getElementById("bird")
let gun=document.getElementById("gun")
let game=document.getElementById("game")

function toggleGunMenu(){

let m=document.getElementById("gunPopup")

m.style.display=m.style.display=="block"?"none":"block"

}

function selectGun(n){

gunType=n
document.getElementById("gunPopup").style.display="none"

}

/* spawn bird */

function spawnBird(){

if(gamePaused)return

canShoot=true

let y=Math.random()*200+60
let speed=Math.random()*5000+4000

bird.style.top=y+"px"
bird.style.left="-100px"

bird.animate(
[{left:"-100px"},{left:"110%"}],
{duration:speed,iterations:1}
)

}

spawnBird()

setInterval(spawnBird,6000)

/* move gun */

game.addEventListener("touchmove",e=>{
if(gamePaused)return
gun.style.left=e.touches[0].clientX+"px"
})

game.addEventListener("mousemove",e=>{
if(gamePaused)return
gun.style.left=e.clientX+"px"
})

/* shoot */

game.addEventListener("click",()=>{

if(!canShoot||gamePaused)return

canShoot=false

document.getElementById("gunSound").play()

if(gunType==1) createBullet("fire.gif")
if(gunType==2) createBullet("fire.gif")
if(gunType==3) createBullet("lightning.png")

})

function createBullet(img){

let bullet=document.createElement("img")

bullet.className="bullet"
bullet.src=img

bullet.style.left=gun.offsetLeft+"px"

game.appendChild(bullet)

setTimeout(()=>{
bullet.remove()
checkHit()
},800)

}

/* hit */

function checkHit(){

let birdRect=bird.getBoundingClientRect()
let gunRect=gun.getBoundingClientRect()

if(Math.abs(birdRect.left-gunRect.left)<80){

blastBird()

}

}

/* blast */

function blastBird(){

document.getElementById("blastSound").play()

let rect=bird.getBoundingClientRect()

let blast=document.createElement("div")

blast.className="blast"
blast.innerHTML="💥"

blast.style.left=rect.left+"px"
blast.style.top=rect.top+"px"

document.body.appendChild(blast)

setTimeout(()=>blast.remove(),600)

/* coin */

let coin=document.createElement("div")

coin.className="coin"
coin.innerHTML="🪙+10"

coin.style.left=rect.left+"px"
coin.style.top=rect.top+"px"

document.body.appendChild(coin)

setTimeout(()=>coin.remove(),1000)

coins+=10
sessionStorage.setItem("coins",coins)

document.getElementById("coins").innerText=coins

if(coins>=nextPopup){

gamePaused=true

document.getElementById("popupSound").play()

document.getElementById("popup").style.display="block"

nextPopup+=70
sessionStorage.setItem("nextPopup",nextPopup)

}

spawnBird()

}

function closePopup(){

document.getElementById("popup").style.display="none"

window.open("https://your-adsterra-direct-link.com","_blank")

}

window.addEventListener("focus",()=>{

gamePaused=false

})

</script>

</body>
</html>
